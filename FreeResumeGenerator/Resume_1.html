<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume – Dark Sidebar</title>
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600&family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{--accent:#c9a96e;--accent-rgb:201,169,110;}
  body{background:#1a1a1a;font-family:'Outfit',sans-serif;display:flex;flex-direction:column;align-items:center;padding:32px 16px 60px;min-height:100vh;}

  .toolbar{display:flex;gap:12px;margin-bottom:24px;align-items:center;}
  .tb-btn{background:none;border:1px solid #333;color:#aaa;font-family:inherit;font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;padding:9px 20px;border-radius:2px;cursor:pointer;transition:all .2s;}
  .tb-btn:hover{border-color:var(--accent);color:var(--accent);}
  .tb-btn.primary{background:var(--accent);border-color:var(--accent);color:#0c0c0c;font-weight:600;}
  .tb-btn.primary:hover{opacity:.88;}

  .page{width:794px;min-height:1123px;background:#f6f4f0;display:grid;grid-template-columns:264px 1fr;box-shadow:0 20px 80px rgba(0,0,0,.6);font-size:8.8pt;line-height:1.55;color:#1c1c1c;position:relative;overflow:hidden;}

  /* SIDEBAR */
  .sidebar{background:#141414;color:#d8d4cc;display:flex;flex-direction:column;}

  .sb-photo-wrap{padding:34px 28px 0;display:flex;flex-direction:column;align-items:center;}
  .sb-photo{width:104px;height:104px;border-radius:50%;object-fit:cover;border:3px solid var(--accent);}
  .sb-photo-placeholder{width:104px;height:104px;border-radius:50%;background:#232323;border:3px solid var(--accent);display:flex;align-items:center;justify-content:center;}

  .sb-name-block{padding:16px 26px 0;text-align:center;}
  .sb-fname{font-family:'Cormorant Garamond',serif;font-size:22pt;font-weight:600;color:#fff;line-height:1;letter-spacing:-.01em;}
  .sb-lname{font-family:'Cormorant Garamond',serif;font-size:22pt;font-weight:600;color:var(--accent);line-height:1.1;letter-spacing:-.01em;}
  .sb-job{font-size:7pt;letter-spacing:.2em;text-transform:uppercase;color:#666;margin-top:5px;}

  .sb-divider{height:1px;background:#222;margin:6px 6px;}

  .sb-section{padding:0 26px 0;}
  .sb-sec-title{font-size:6.2pt;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;font-weight:500;}

  .contact-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
  .contact-row svg{flex-shrink:0;color:var(--accent);margin-top:1px;}
  .contact-val{font-size:7.5pt;color:#aaa;line-height:1.4;word-break:break-all;}
  .contact-val a{color:#aaa;}

  .soc-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;}
  .soc-row svg{flex-shrink:0;color:var(--accent);margin-top:1px;}
  .soc-val{font-size:7.2pt;color:#888;line-height:1.4;word-break:break-all;}
  .soc-val a{color:#888;}

  .personal-grid{display:flex;flex-direction:column;gap:4px;}
  .p-row{display:grid;grid-template-columns:72px 1fr;align-items:baseline;gap:0 6px;}
  .p-lbl{font-size:5.8pt;letter-spacing:.15em;text-transform:uppercase;color:#555;}
  .p-val{font-size:7.5pt;color:#aaa;}

  .skills-2col{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px;}
  .skill-item{margin-bottom:6px;}
  .skill-name{font-size:7.6pt;color:#bbb;margin-bottom:3px;display:flex;justify-content:space-between;}
  .skill-name span{color:#555;font-size:6.5pt;}
  .bar-track{height:3px;background:#232323;border-radius:2px;}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),color-mix(in srgb,var(--accent) 60%,#fff));border-radius:2px;}

  .lang-item{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
  .lang-name{font-size:7.5pt;color:#bbb;}
  .lang-dots{display:flex;gap:3px;}
  .dot{width:6px;height:6px;border-radius:50%;background:#2a2a2a;}
  .dot.on{background:var(--accent);}

  .hobby-pill-sb{display:inline-block;font-size:6.5pt;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:10px;padding:2px 7px;color:#888;margin:0 3px 4px 0;}

  /* MAIN */
  .main{padding:32px 36px;display:flex;flex-direction:column;gap:0;}

  .sec-title{font-size:6.8pt;letter-spacing:.26em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:6px;font-weight:500;}
  .sec-title::after{content:'';flex:1;height:1px;background:#e0ddd8;}

  .profile-text{font-size:9pt;color:#444;line-height:1.7;margin-bottom:7px;font-style:normal;font-family:'Inter',serif; }
  .objective-text{font-size:8.5pt;color:#444;line-height:1.65;margin-bottom:7px;padding:8px 12px;background:#fdfdfda9;border-left:2.5px solid var(--accent);border-radius:0 3px 3px 0;}

  .timeline-item{display:grid;grid-template-columns:80px 1fr;gap:0 14px;margin-bottom:6px;position:relative;}
  .tl-year{font-size:7pt;color:#aaa;text-align:right;padding-top:2px;letter-spacing:.04em;line-height:1.4;}
  .tl-right{border-left:1.5px solid #e0ddd8;padding-left:14px;padding-bottom:3px;position:relative;}
  .tl-right::before{content:'';position:absolute;left:-4.5px;top:5px;width:7px;height:7px;border-radius:50%;background:var(--accent);border:1.5px solid #f6f4f0;}
  .tl-title{font-size:9.2pt;font-weight:600;color:#141414;letter-spacing:.01em;}
  .tl-company{font-size:7.5pt;color:var(--accent);margin-bottom:2px;font-weight:500;}
  .tl-sub{font-size:7.2pt;color:#888;margin-bottom:3px;letter-spacing:.04em;}
  .tl-desc{font-size:7.6pt;color:#555;line-height:1.6;}

  .proj-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:6px;margin-bottom:18px;}
  .proj-card{border:none;border-left:2.5px solid var(--accent);border-radius:0;padding:6px 10px;background:transparent;}
  .proj-card-title{font-size:9.2pt;font-weight:600;color:#141414;margin-bottom:2px;letter-spacing: .01em;}
  .proj-card-tech{font-size:6.5pt;color:var(--accent);margin-bottom:2px;letter-spacing: .04em;}
  .proj-card-desc{font-size:7.6pt;color:#555;line-height:1.5;}
  .proj-card-link{font-size:7pt;color:#aaa;margin-top:2px;display:flex;align-items:center;gap:3px;}
  .proj-card-link svg{color:var(--accent);}

  .award-item{display:flex;gap:10px;margin-bottom:13px;align-items:flex-start;}
  .award-badge{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .award-badge svg{color:#fff;}
  .award-name-t{font-size:8.8pt;font-weight:600;color:#141414;}
  .award-meta-t{font-size:7pt;color:#888;margin-bottom:2px;}
  .award-desc-t{font-size:7.2pt;color:#555;line-height:1.55;}

  .train-item{display:grid;grid-template-columns:80px 1fr;gap:0 14px;margin-bottom:12px;}
  .train-date-col{font-size:7pt;color:#aaa;text-align:right;padding-top:2px;}
  .train-right{border-left:1.5px solid #e0ddd8;padding-left:14px;padding-bottom:3px;position:relative;}
  .train-right::before{content:'';position:absolute;left:-4px;top:5px;width:6px;height:6px;border-radius:50%;background:#ccc;border:1px solid #f6f4f0;}
  .train-title-t{font-size:8.5pt;font-weight:600;color:#141414;}
  .train-org-t{font-size:7pt;color:#888;}

  .cert-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px;}
  .cert-card{border:1px solid #e8e5e0;border-radius:3px;overflow:hidden;background:#fff;}
  .cert-img{width:100%;height:56px;object-fit:cover;}
  .cert-img-placeholder{width:100%;height:56px;background:#f0ede8;display:flex;align-items:center;justify-content:center;}
  .cert-body{padding:7px 9px;}
  .cert-title-txt{font-size:7.6pt;font-weight:600;color:#141414;margin-bottom:2px;}
  .cert-desc-txt{font-size:6.8pt;color:#888;line-height:1.5;}
  .cert-dates{font-size:6.2pt;color:#bbb;margin-top:3px;}

  .ref-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .ref-card{border-left:2.5px solid var(--accent);padding:7px 11px;background:#fff;}
  .ref-name{font-size:9pt;font-weight:600;color:#141414;font-family:'Cormorant Garamond',serif;}
  .ref-bio{font-size:7pt;color:#888;margin-bottom:4px;}
  .ref-detail{font-size:7pt;color:#666;display:flex;gap:5px;align-items:center;margin-top:2px;}
  .ref-detail svg{flex-shrink:0;color:var(--accent);}

  .section-gap{margin-bottom:7px;}

  /* ── RESPONSIVE SCREEN ── */
  @media screen and (max-width:860px){
    body{padding:16px 8px 40px;}
    .toolbar{flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px;}
    .tb-btn{font-size:.65rem;padding:7px 14px;}
    /* Scale the fixed-width page to fit the viewport */
    .page{
      width:100%;
      min-height:unset;
      grid-template-columns:220px 1fr;
      transform-origin:top center;
    }
    .sb-fname,.sb-lname{font-size:16pt;}
    .sb-section{padding:0 16px 0;}
    .main{padding:20px 20px;}
  }

  @media screen and (max-width:640px){
    body{padding:8px 0 40px;}
    .toolbar{padding:0 12px;}
    /* Stack sidebar on top of main on very small screens */
    .page{
      display:flex;
      flex-direction:column;
      width:100%;
    }
    .sidebar{
      width:100%;
      flex-direction:row;
      flex-wrap:wrap;
      padding-bottom:16px;
    }
    .sb-photo-wrap{padding:20px 16px 0;width:100%;display:flex;flex-direction:row;align-items:center;gap:16px;}
    .sb-name-block{padding:16px 16px 0;text-align:left;flex:1;}
    .sb-fname,.sb-lname{font-size:18pt;}
    .sb-section{padding:0 16px;width:50%;}
    .sb-divider{display:none;}
    .main{padding:20px 16px;}
    .cert-grid{grid-template-columns:1fr;}
    .ref-grid{grid-template-columns:1fr;}
    .timeline-item{grid-template-columns:60px 1fr;}
  }

  @media print{
    @page{size:A4;margin:0;}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    body{background:#fff;padding:0;margin:0;}
    .toolbar{display:none;}
    .page{box-shadow:none;width:794px;min-height:auto;overflow:visible;display:grid;grid-template-columns:264px 1fr;flex-direction:unset;}
    .sidebar{width:unset;flex-direction:column;flex-wrap:unset;overflow:visible;}
    .sb-photo-wrap{flex-direction:column;align-items:center;}
    .sb-name-block{text-align:center;}
    .sb-section{width:unset;padding:0 26px 0;}
    .sb-divider{display:block;}
    .main{overflow:visible;padding:32px 36px;}
    .timeline-item,.proj-card,.award-item,.train-item,.cert-card,.ref-card{break-inside:avoid;}
    .section-gap{break-inside:avoid;}
    .cert-grid{grid-template-columns:1fr 1fr;}
    .ref-grid{grid-template-columns:1fr 1fr;}
    .proj-grid{grid-template-columns:1fr 1fr;}
    .timeline-item{grid-template-columns:80px 1fr;}
  }
</style>
</head>
<body>

<div class="toolbar">
  <button class="tb-btn" onclick="goBack()">← Back to Editor</button>
  <button class="tb-btn primary" onclick="window.print()">⬇ Download / Print PDF</button>
</div>

<div class="page" id="resumePage">
  <aside class="sidebar">
    <div class="sb-photo-wrap"><div id="sbPhotoContainer"></div></div>
    <div class="sb-name-block">
      <div class="sb-fname" id="sb-fname"></div>
      <div class="sb-lname" id="sb-lname"></div>
      <div class="sb-job" id="sb-job"></div>
    </div>

    <div class="sb-divider"></div>
    <div class="sb-section" id="sb-contact-sec">
      <div class="sb-sec-title">Contact</div>
      <div id="sb-contacts"></div>
    </div>

    <div class="sb-divider"></div>
    <div class="sb-section" id="sb-social-sec">
      <div class="sb-sec-title">Social Profiles</div>
      <div id="sb-socials"></div>
    </div>

    <div class="sb-divider"></div>
    <div class="sb-section" id="sb-personal-sec">
      <div class="sb-sec-title">Personal Info</div>
      <div class="personal-grid" id="sb-personal"></div>
    </div>

    <div class="sb-divider"></div>
    <div class="sb-section" id="sb-soft-sec">
      <div class="sb-sec-title">Software Skills</div>
      <div class="skills-2col" id="sb-soft-skills"></div>
    </div>

    <div class="sb-divider"></div>
    <div class="sb-section" id="sb-inter-sec">
      <div class="sb-sec-title">Interpersonal Skills</div>
      <div class="skills-2col" id="sb-inter-skills"></div>
    </div>

    <div class="sb-divider"></div>
    <div class="sb-section" id="sb-lang-sec">
      <div class="sb-sec-title">Languages</div>
      <div id="sb-languages"></div>
    </div>

    <div class="sb-divider"></div>
    <div class="sb-section" id="sb-hobby-sec">
      <div class="sb-sec-title">Hobbies & Interests</div>
      <div id="sb-hobbies"></div>
    </div>
  </aside>

  <main class="main">
    <div id="main-profile-sec" class="section-gap">
      <div class="sec-title">Profile</div>
      <div class="profile-text" id="main-profile"></div>
    </div>
    <div id="main-objective-sec" class="section-gap" style="display:none">
      <div class="sec-title">Career Objective</div>
      <div class="objective-text" id="main-objective"></div>
    </div>
    <div id="main-work-sec" class="section-gap">
      <div class="sec-title">Work Experience</div>
      <div id="main-work"></div>
    </div>
    <div id="main-edu-sec" class="section-gap">
      <div class="sec-title">Education</div>
      <div id="main-edu"></div>
    </div>
    <div id="main-proj-sec" class="section-gap">
      <div class="sec-title">Projects</div>
      <div class="proj-grid" id="main-projs"></div>
    </div>
    <div id="main-cert-sec" class="section-gap">
      <div class="sec-title">Certifications</div>
      <div class="cert-grid" id="main-certs"></div>
    </div>
    <div id="main-award-sec" class="section-gap">
      <div class="sec-title">Achievements & Awards</div>
      <div id="main-awards"></div>
    </div>
    <div id="main-train-sec" class="section-gap">
      <div class="sec-title">Trainings & Seminars</div>
      <div id="main-trains"></div>
    </div>
    <div id="main-ref-sec" class="section-gap">
      <div class="sec-title">References</div>
      <div class="ref-grid" id="main-refs"></div>
    </div>
  </main>
</div>

<script>
// FIX 1: Back to Editor — window.open(_blank) creates a new tab with no history.
// window.close() closes the tab; if blocked by browser, fall back to index.html.
function goBack(){
  window.close();
  setTimeout(()=>{ window.location.href='index.html'; }, 300);
}

const ic = (path, size=12) => `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;
const PHONE_IC = ic('<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>');
const EMAIL_IC = ic('<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>');
const WEB_IC   = ic('<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>');
const PIN_IC   = ic('<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>');
const STAR_IC  = ic('<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',10);
const LINK_IC  = ic('<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>',10);

const PLAT_IC = {
  linkedin: ic('<path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>'),
  github:   ic('<path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>'),
  portfolio: WEB_IC, behance: WEB_IC, dribbble: WEB_IC,
  facebook: ic('<path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>'),
  twitter:  ic('<path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/>'),
  instagram: ic('<rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>'),
  youtube:  ic('<path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/>'),
  other: WEB_IC
};

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function lvlLabel(v){ v=+v; if(v>=88) return 'Expert'; if(v>=70) return 'Good'; if(v>=50) return 'Basic'; return 'Learning'; }
function langDots(v){ v=+v; const f=Math.round(v/20); return Array.from({length:5},(_,i)=>`<div class="dot${i<f?' on':''}"></div>`).join(''); }
function fmtDate(s){ if(!s) return ''; const [y,m,d]=s.split('-'); return new Date(+y,+m-1,+d).toLocaleDateString('en-US',{month:'short',year:'numeric'}); }
function hide(id){ const el=document.getElementById(id); if(el) el.style.display='none'; }

window.addEventListener('DOMContentLoaded',()=>{
  let d;
  try{ d=JSON.parse(localStorage.getItem('resumeData')||'null'); }catch(e){}
  if(!d){ document.body.innerHTML='<p style="color:#fff;text-align:center;margin-top:100px;font-family:sans-serif">No resume data found. Please go back and fill the form.</p>'; return; }

  // Apply theme color
  if(d.themeColor){
    document.documentElement.style.setProperty('--accent', d.themeColor);
  }

  // FIX 2: Font Family — load AND apply to document.body so it actually takes effect
  if(d.themeFont){
    const link=document.createElement('link');
    link.rel='stylesheet';
    link.href=`https://fonts.googleapis.com/css2?family=${d.themeFont.replace(/ /g,'+')}:wght@300;400;500;600;700&display=swap`;
    document.head.appendChild(link);
    // Actually apply it — this was missing before
    document.body.style.fontFamily = `'${d.themeFont}', sans-serif`;
  }

  // Photo
  const pc=document.getElementById('sbPhotoContainer');
  if(d.photo) pc.innerHTML=`<img class="sb-photo" src="${d.photo}" alt="">`;
  else pc.innerHTML=`<div class="sb-photo-placeholder">${ic('<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',42)}</div>`;

  document.getElementById('sb-fname').textContent=d.firstName||'';
  document.getElementById('sb-lname').textContent=d.lastName||'';
  document.getElementById('sb-job').textContent=d.jobTitle||'';

  // Contact
  const contacts=[];
  if(d.phone1) contacts.push({ic:PHONE_IC,val:d.phone1});
  if(d.phone2) contacts.push({ic:PHONE_IC,val:d.phone2});
  if(d.email)  contacts.push({ic:EMAIL_IC,val:`<a href="mailto:${d.email}" style="color:inherit">${d.email}</a>`});
  if(d.website)contacts.push({ic:WEB_IC,val:`<a href="${d.website.startsWith('http')?d.website:'https://'+d.website}" target="_blank" style="color:inherit">${d.website}</a>`});
  if(d.address)contacts.push({ic:PIN_IC,val:d.address});
  const cDiv=document.getElementById('sb-contacts');
  if(contacts.length) cDiv.innerHTML=contacts.map(c=>`<div class="contact-row">${c.ic}<div class="contact-val">${c.val}</div></div>`).join('');
  else hide('sb-contact-sec');

  // Social
  const socials=(d.social||[]).filter(s=>s.url);
  if(socials.length){
    document.getElementById('sb-socials').innerHTML=socials.map(s=>`
      <div class="soc-row">${PLAT_IC[s.platform]||WEB_IC}<div class="soc-val"><a href="${s.url.startsWith('http')?s.url:'https://'+s.url}" target="_blank" style="color:inherit">${s.url.replace(/^https?:\/\//,'').replace(/\/$/,'')}</a></div></div>`).join('');
  } else hide('sb-social-sec');

  // Personal
  const pRows=[];
  if(d.gender)      pRows.push(['Gender',d.gender]);
  if(d.civilStatus) pRows.push(['Civil Status',d.civilStatus]);
  if(d.age)         pRows.push(['Age',d.age]);
  if(d.birthPlace)  pRows.push(['Birth Place',d.birthPlace]);
  if(d.religion)    pRows.push(['Religion',d.religion]);
  const pDiv=document.getElementById('sb-personal');
  if(pRows.length) pDiv.innerHTML=pRows.map(([l,v])=>`<div class="p-row"><span class="p-lbl">${l}</span><span class="p-val">${v}</span></div>`).join('');
  else hide('sb-personal-sec');

  // Skills
  const soft=(d.software||[]).filter(s=>s.name);
  if(soft.length) document.getElementById('sb-soft-skills').innerHTML=soft.map(s=>`<div class="skill-item"><div class="skill-name">${s.name}<span>${lvlLabel(s.level)}</span></div><div class="bar-track"><div class="bar-fill" style="width:${s.level}%"></div></div></div>`).join('');
  else hide('sb-soft-sec');

  const inter=(d.interpersonal||[]).filter(s=>s.name);
  if(inter.length) document.getElementById('sb-inter-skills').innerHTML=inter.map(s=>`<div class="skill-item"><div class="skill-name">${s.name}<span>${lvlLabel(s.level)}</span></div><div class="bar-track"><div class="bar-fill" style="width:${s.level}%"></div></div></div>`).join('');
  else hide('sb-inter-sec');

  // Languages
  const langs=(d.languages||[]).filter(l=>l.name);
  if(langs.length) document.getElementById('sb-languages').innerHTML=langs.map(l=>`<div class="lang-item"><span class="lang-name">${l.name}</span><div class="lang-dots">${langDots(l.level)}</div></div>`).join('');
  else hide('sb-lang-sec');

  // Hobbies
  if(d.hobbies && d.hobbies.trim()){
    const items=d.hobbies.split(/[,\n]+/).map(s=>s.trim()).filter(Boolean);
    document.getElementById('sb-hobbies').innerHTML=items.map(h=>`<span class="hobby-pill-sb">${h}</span>`).join('');
  } else hide('sb-hobby-sec');

  // Profile + Objective
  if(d.profile) document.getElementById('main-profile').textContent=d.profile;
  else hide('main-profile-sec');
  if(d.objective){
    document.getElementById('main-objective').textContent=d.objective;
    document.getElementById('main-objective-sec').style.display='block';
  }

  // Work
  const work=(d.work||[]).filter(w=>w.title||w.desc);
  if(work.length){
    document.getElementById('main-work').innerHTML=work.map(w=>`
      <div class="timeline-item">
        <div class="tl-year">${esc(w.year||'')}</div>
        <div class="tl-right">
          <div class="tl-title">${esc(w.title||'')}</div>
          ${w.company?`<div class="tl-company">${esc(w.company)}</div>`:''}
          <div class="tl-desc">${esc(w.desc||'')}</div>
        </div>
      </div>`).join('');
  } else hide('main-work-sec');

  // Education
  const edu=(d.education||[]).filter(e=>e.degree||e.inst);
  if(edu.length){
    document.getElementById('main-edu').innerHTML=edu.map(e=>`
      <div class="timeline-item">
        <div class="tl-year">${esc(e.year||'')}</div>
        <div class="tl-right">
          <div class="tl-title">${esc(e.degree||'')}</div>
          <div class="tl-sub">${esc(e.inst||'')}</div>
          <div class="tl-desc">${esc(e.desc||'')}</div>
        </div>
      </div>`).join('');
  } else hide('main-edu-sec');

  // Projects
  const projs=(d.projects||[]).filter(p=>p.title);
  if(projs.length){
    document.getElementById('main-projs').innerHTML=projs.map(p=>`
      <div class="proj-card">
        <div class="proj-card-title">${esc(p.title)}</div>
        ${p.tech?`<div class="proj-card-tech">${esc(p.tech)}</div>`:''}
        ${p.desc?`<div class="proj-card-desc">${esc(p.desc)}</div>`:''}
        ${p.link?`<div class="proj-card-link">${LINK_IC} <a href="${p.link.startsWith('http')?esc(p.link):'https://'+esc(p.link)}" target="_blank" style="color:inherit">${esc(p.link)}</a></div>`:''}
      </div>`).join('');
  } else hide('main-proj-sec');

  // Certifications
  const certs=(d.certifications||[]).filter(c=>c.title);
  if(certs.length){
    document.getElementById('main-certs').innerHTML=certs.map(c=>`
      <div class="cert-card">
        ${c.img?`<img class="cert-img" src="${esc(c.img)}" alt="">`:`<div class="cert-img-placeholder">${ic('<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>',20)}</div>`}
        <div class="cert-body">
          <div class="cert-title-txt">${esc(c.title)}</div>
          ${c.desc?`<div class="cert-desc-txt">${esc(c.desc)}</div>`:''}
          ${(c.start||c.end)?`<div class="cert-dates">${fmtDate(c.start)}${c.start&&c.end?' – ':''}${fmtDate(c.end)}</div>`:''}
        </div>
      </div>`).join('');
  } else hide('main-cert-sec');

  // Awards
  const awards=(d.awards||[]).filter(a=>a.name);
  if(awards.length){
    document.getElementById('main-awards').innerHTML=awards.map(a=>`
      <div class="award-item">
        <div class="award-badge">${STAR_IC}</div>
        <div>
          <div class="award-name-t">${esc(a.name)}</div>
          <div class="award-meta-t">${[a.org,a.year].filter(Boolean).map(esc).join(' · ')}</div>
          ${a.desc?`<div class="award-desc-t">${esc(a.desc)}</div>`:''}
        </div>
      </div>`).join('');
  } else hide('main-award-sec');

  // Trainings
  const trains=(d.trainings||[]).filter(t=>t.title);
  if(trains.length){
    document.getElementById('main-trains').innerHTML=trains.map(t=>`
      <div class="train-item">
        <div class="train-date-col">${t.date?fmtDate(t.date):''}</div>
        <div class="train-right">
          <div class="train-title-t">${esc(t.title)}</div>
          ${t.org?`<div class="train-org-t">${esc(t.org)}</div>`:''}
          ${t.desc?`<div class="tl-desc" style="margin-top:2px">${esc(t.desc)}</div>`:''}
        </div>
      </div>`).join('');
  } else hide('main-train-sec');

  // References
  const refs=(d.references||[]).filter(r=>r.name);
  if(refs.length){
    document.getElementById('main-refs').innerHTML=refs.map(r=>`
      <div class="ref-card">
        <div class="ref-name">${esc(r.name)}</div>
        ${r.bio?`<div class="ref-bio">${esc(r.bio)}</div>`:''}
        ${r.phone?`<div class="ref-detail">${PHONE_IC}${esc(r.phone)}</div>`:''}
        ${r.email?`<div class="ref-detail">${EMAIL_IC}${esc(r.email)}</div>`:''}
        ${r.addr?`<div class="ref-detail">${PIN_IC}${esc(r.addr)}</div>`:''}
      </div>`).join('');
  } else hide('main-ref-sec');
});
</script>
</body>
</html>
